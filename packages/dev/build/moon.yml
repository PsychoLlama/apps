$schema: 'https://moonrepo.dev/schemas/project.json'

project:
  name: '@dev/build'
  description: 'Shared workspace tooling — static checks, ignore patterns, etc.'

tasks:
  # Fails if any task `inputs:` glob matches no files, or any literal
  # file input is missing. Moon happily caches past a stale glob, so
  # a rename elsewhere in the repo can silently orphan a declaration
  # — affected-task detection then skips work it should be running.
  # Wired as an `implicitDeps` entry in `.moon/tasks.yml`, so every
  # task runs this first; CI runs it fresh regardless of cache.
  validate-moon:
    # `--import` loads `validate-moon` via the package's exports
    # map — no reaching into `src/`. The `--eval ''` is a no-op
    # main script; node would otherwise drop into a REPL.
    command: 'node'
    args: ['--import', '@dev/build/validate-moon', '--eval', '']
    inputs:
      - 'src/**/*'
      - '/moon.yml'
      - '/.moon/*.yml'
      - '/packages/*/*/moon.yml'
    options:
      runFromWorkspaceRoot: true
      runInCI: 'always'
