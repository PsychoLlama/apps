$schema: 'https://moonrepo.dev/schemas/project.json'

project:
  name: '@dev/workspace-cli'
  description: 'Internal workspace tooling CLI — static checks, etc.'

tasks:
  # Aggregate workspace validator. Runs every subcheck the CLI
  # exposes (`check moon`, `check catalog`). Wired as the single
  # `implicitDeps` entry in `.moon/tasks.yml`, so every task in the
  # workspace runs it first.
  #
  # Why one task instead of one per subcheck: moon's implicitDeps
  # are inherited by every task, including any sibling task in the
  # same project. Two implicit-dep tasks form a cycle through that
  # inheritance (each implicitly depends on the other). Collapsing
  # to a single entry sidesteps the cycle.
  #
  # Subchecks worth flagging individually:
  # - `check moon` fails if any task `inputs:` glob matches no
  #   files, or any literal file input is missing. Moon caches past
  #   stale globs, so a rename elsewhere in the repo can silently
  #   orphan a declaration.
  # - `check catalog` fails if a package declares a dep that's
  #   listed in `pnpm-workspace.yaml`'s catalog without using the
  #   `catalog:` protocol. pnpm's `catalogMode: strict` only fires
  #   on `pnpm add`, not on existing manifests, so this fills the
  #   gap.
  check:
    command: 'node'
    args: ['packages/dev/workspace-cli/src/cli.ts', 'check']
    inputs:
      - 'src/**/*'
      - '/moon.yml'
      - '/.moon/*.yml'
      - '/packages/*/*/moon.yml'
      - '/pnpm-workspace.yaml'
      - '/packages/*/*/package.json'
    options:
      runFromWorkspaceRoot: true
