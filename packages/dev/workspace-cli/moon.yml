$schema: 'https://moonrepo.dev/schemas/project.json'

project:
  name: '@dev/workspace-cli'
  description: 'Internal workspace tooling CLI — static checks, etc.'

tasks:
  # Fails if any task `inputs:` glob matches no files, or any literal
  # file input is missing. Moon happily caches past a stale glob, so
  # a rename elsewhere in the repo can silently orphan a declaration
  # — affected-task detection then skips work it should be running.
  # Wired as an `implicitDeps` entry in `.moon/tasks.yml`, so every
  # task runs this first; CI runs it fresh regardless of cache.
  check-moon:
    command: 'node'
    args: ['packages/dev/workspace-cli/src/cli.ts', 'check', 'moon']
    inputs:
      - 'src/**/*'
      - '/moon.yml'
      - '/.moon/*.yml'
      - '/packages/*/*/moon.yml'
    options:
      runFromWorkspaceRoot: true
      runInCI: 'always'

  # Fails if any package declares a dependency that's also listed
  # in `pnpm-workspace.yaml`'s catalog without using the `catalog:`
  # protocol — that path silently bypasses the catalog and lets
  # versions drift. pnpm's `catalogMode: strict` only fires on
  # `pnpm add`, not on existing manifests, so this fills the gap.
  check-catalog:
    command: 'node'
    args: ['packages/dev/workspace-cli/src/cli.ts', 'check', 'catalog']
    inputs:
      - 'src/**/*'
      - '/pnpm-workspace.yaml'
      - '/packages/*/*/package.json'
    options:
      runFromWorkspaceRoot: true
      runInCI: 'always'
