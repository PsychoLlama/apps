$schema: 'https://moonrepo.dev/schemas/project.json'

project:
  name: '@dev/moon-lint'
  description: 'Static checks for moon configuration'

tasks:
  # Fails if any task `inputs:` glob matches no files, or any literal
  # file input is missing. Moon happily caches past a stale glob, so
  # a rename elsewhere in the repo can silently orphan a declaration
  # — affected-task detection then skips work it should be running.
  # Runs uncached and unconditionally in CI because filesystem
  # renames outside moon configs don't register as input changes.
  validate:
    command: 'node'
    args: ['$projectRoot/src/index.ts']
    options:
      cache: false
      runFromWorkspaceRoot: true
      runInCI: 'always'
