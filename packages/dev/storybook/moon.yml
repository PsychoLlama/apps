$schema: 'https://moonrepo.dev/schemas/project.json'

project:
  name: '@dev/storybook'
  description: 'Storybook workbench for every package'

dependsOn:
  - '@app/main'
  - '@app/studio'
  - '@lib/design'
  - '@lib/shell'
  - '@lib/state'
  - '@lib/ui'

tasks:
  dev:
    command: 'pnpm'
    args: ['dev']
    local: true

  # Stories now live in this package's `src/`. Source files in the
  # libraries they exercise still need to invalidate the build cache.
  build:
    command: 'pnpm'
    args: ['build']
    inputs:
      - '.storybook/**/*'
      - 'src/**/*'
      - '/packages/app/main/src/{app.css,theme}.ts'
      - '/packages/app/studio/src/**/*'
      - '/packages/lib/**/src/**/*'
    outputs:
      - 'storybook-static'

  # Browser-renders every story to catch runtime regressions. Mirrors
  # `build`'s inputs since both tasks drive the same stories through
  # the same storybook config.
  smoke-test:
    command: 'pnpm'
    args: ['smoke-test']
    inputs:
      - '.storybook/**/*'
      - 'smoke-test.config.ts'
      - 'src/**/*'
      - '/packages/app/main/src/{app.css,theme}.ts'
      - '/packages/app/studio/src/**/*'
      - '/packages/lib/**/src/**/*'
