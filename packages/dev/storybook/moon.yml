$schema: 'https://moonrepo.dev/schemas/project.json'

project:
  name: '@dev/storybook'
  description: 'Storybook workbench for every package'

dependsOn:
  - '@app/main'
  - '@app/studio'
  - '@lib/design'
  - '@lib/shell'
  - '@lib/state'
  - '@lib/ui'

tasks:
  dev:
    command: 'pnpm'
    args: ['dev']
    local: true

  # Storybook reads stories from every package via
  # `.storybook/main.ts`'s `packages/*/*/src/**/*.stories.*` glob, so
  # any story (or any source a story imports) must invalidate the
  # build cache.
  build:
    command: 'pnpm'
    args: ['build']
    inputs:
      - 'src/**/*'
      - '.storybook/**/*'
      - 'vite-ignored.ts'
      - '/packages/**/*.stories.*'
      - '/packages/app/main/src/{app.css,theme}.ts'
      - '/packages/app/studio/src/**/*'
      - '/packages/lib/**/src/**/*'
    outputs:
      - 'storybook-static'

  # Browser-renders every story in every package to catch runtime
  # regressions. Mirrors `build`'s inputs since both tasks drive the
  # same stories through the same storybook config.
  smoke-test:
    command: 'pnpm'
    args: ['smoke-test']
    inputs:
      - 'src/**/*'
      - '.storybook/**/*'
      - 'vite-ignored.ts'
      - 'smoke-test.config.ts'
      - '/packages/**/*.stories.*'
      - '/packages/app/main/src/{app.css,theme}.ts'
      - '/packages/app/studio/src/**/*'
      - '/packages/lib/**/src/**/*'
