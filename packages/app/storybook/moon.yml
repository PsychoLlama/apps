$schema: 'https://moonrepo.dev/schemas/project.json'

project:
  name: '@app/storybook'
  description: 'Storybook workbench for every package'

dependsOn:
  - '@app/studio'
  - '@lib/design'
  - '@lib/shell'
  - '@lib/state'
  - '@lib/ui'

tasks:
  dev:
    command: 'pnpm'
    args: ['dev']
    local: true

  # Storybook reads stories from every package via
  # `.storybook/main.ts`'s `packages/*/*/src/**/*.stories.*` glob, so
  # any story (or any source a story imports) must invalidate the
  # build cache.
  build:
    command: 'pnpm'
    args: ['build']
    inputs:
      - 'src/**/*'
      - '.storybook/**/*'
      - 'vite-ignored.ts'
      - '/packages/**/*.stories.*'
      - '/packages/app/studio/src/**/*'
      - '/packages/lib/**/src/**/*'
    outputs:
      - 'storybook-static'

  # Mirrors `build`'s inputs — both tasks render every story from
  # every package through the same storybook config.
  test-storybook:
    command: 'pnpm'
    args: ['test:storybook']
    inputs:
      - 'src/**/*'
      - '.storybook/**/*'
      - 'vite-ignored.ts'
      - 'vitest.storybook.config.ts'
      - '/packages/**/*.stories.*'
      - '/packages/app/studio/src/**/*'
      - '/packages/lib/**/src/**/*'
