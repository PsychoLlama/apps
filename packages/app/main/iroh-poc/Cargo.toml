[package]
name = "iroh-poc"
version = "0.0.0"
edition = "2024"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
anyhow = "1"
async-channel = "2"
console_error_panic_hook = "0.1"
getrandom = { version = "0.3", features = ["wasm_js"] }
iroh = { version = "0.98", default-features = false, features = ["tls-ring"] }
n0-future = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde-wasm-bindgen = "0.6"
tokio = { version = "1", default-features = false, features = ["sync"] }
tokio-stream = { version = "0.1", default-features = false, features = ["sync"] }
tracing = { version = "0.1", features = ["release_max_level_off"] }
wasm-bindgen = "=0.2.118"
wasm-bindgen-futures = "0.4"
wasm-streams = "0.5"

[profile.release]
codegen-units = 1
strip = "symbols"
debug = false
lto = true
opt-level = "z"
panic = "abort"
