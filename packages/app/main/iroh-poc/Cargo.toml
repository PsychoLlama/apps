[package]
name = "iroh-poc"
version = "0.0.0"
edition = "2024"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
anyhow = "1"
async-channel = "2"
console_error_panic_hook = "0.1"
getrandom = { version = "0.3", features = ["wasm_js"] }
iroh = { version = "0.98", default-features = false, features = ["tls-ring"] }
n0-future = "0.3"
serde_json = "1"
# Direct dep purely to enable `release_max_level_off` — cargo's feature
# unification turns iroh's `tracing` calls into compile-time no-ops in
# release builds, dropping the regex/formatter machinery from the wasm.
tracing = { version = "0.1", features = ["release_max_level_off"] }
wasm-bindgen = "=0.2.117"
wasm-bindgen-futures = "0.4"
wasm-streams = "0.5"

[profile.release]
codegen-units = 1
strip = "symbols"
debug = false
lto = true
opt-level = "z"
panic = "abort"
