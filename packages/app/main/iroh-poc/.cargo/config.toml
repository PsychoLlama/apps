[build]
target = "wasm32-unknown-unknown"

[target.wasm32-unknown-unknown]
rustflags = ['--cfg', 'getrandom_backend="wasm_js"']

# `ring`'s `build.rs` (via the `cc` crate) compiles the crypto C glue
# directly into the wasm module — without these, the `ring_core_*`
# symbols become `env` imports the browser host can't satisfy.
[env]
CC_wasm32_unknown_unknown = "clang"
AR_wasm32_unknown_unknown = "llvm-ar"
