name = "apps"
compatibility_date = "2025-04-20"
# Enables `<version>-apps.<account>.workers.dev` URLs for `versions upload`.
# Production traffic still goes through the custom domain below.
preview_urls = true

[assets]
directory = ".output/public"
not_found_handling = "404-page"

[[routes]]
pattern = "apps.psychollama.io"
custom_domain = true
