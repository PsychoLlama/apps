  <!--
    Android adaptive-icon safe zone: 80% of the inscribed circle. The
    background fills edge-to-edge so the OEM mask (circle, squircle,
    teardrop, …) can clip anywhere without exposing a transparent
    corner. The glyph is shrunk into the centered safe square so the
    mask can't crop it.
  -->
