$schema: 'https://moonrepo.dev/schemas/project.json'

project:
  name: '@app/main'
  description: 'SolidStart host app'

dependsOn:
  - '@app/studio'
  - '@lib/design'
  - '@lib/shell'
  - '@lib/state'
  - '@lib/ui'

tasks:
  dev:
    command: 'pnpm'
    args: ['dev']
    local: true

  build:
    command: 'pnpm'
    args: ['build']
    inputs:
      - 'src/**/*'
      - 'vite.config.ts'
      - 'vite-ignored.ts'
      - 'wrangler.toml'
      - '/packages/app/studio/src/**/*'
      - '/packages/lib/**/src/**/*'
    outputs:
      - '.output'
