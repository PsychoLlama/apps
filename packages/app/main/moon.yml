$schema: 'https://moonrepo.dev/schemas/project.json'

project:
  name: '@app/main'
  description: 'SolidStart host app'

dependsOn:
  - '@app/studio'
  - '@lib/design'
  - '@lib/shell'
  - '@lib/state'
  - '@lib/ui'

tasks:
  dev:
    command: 'pnpm'
    args: ['dev']
    local: true

  storybook:
    command: 'pnpm'
    args: ['storybook']
    local: true

  build-app:
    command: 'pnpm'
    args: ['build']
    inputs:
      - 'src/**/*'
      - 'vite.config.ts'
      - 'vite-ignored.ts'
      - 'wrangler.toml'
      - '/packages/app/studio/src/**/*'
      - '/packages/lib/**/src/**/*'
    outputs:
      - '.output'

  # Storybook reads stories from every package via
  # `.storybook/main.ts`'s `packages/*/*/src/**/*.stories.*` glob, so
  # any story (or any source a story imports) must invalidate the
  # build cache.
  build-storybook:
    command: 'pnpm'
    args: ['storybook:build']
    inputs:
      - 'src/**/*'
      - '.storybook/**/*'
      - 'vite.config.ts'
      - 'vite-ignored.ts'
      - '/packages/**/*.stories.*'
      - '/packages/app/studio/src/**/*'
      - '/packages/lib/**/src/**/*'
    outputs:
      - 'storybook-static'

  build:
    command: 'cp'
    args: ['-r', 'storybook-static', '.output/public/__storybook']
    deps:
      - '~:build-app'
      - '~:build-storybook'
    inputs:
      - 'storybook-static/**/*'
      - '.output/**/*'
    outputs:
      - '.output/public/__storybook'

  # Mirrors `build-storybook`'s inputs — both tasks render every
  # story from every package through the same storybook config.
  test-storybook:
    command: 'pnpm'
    args: ['test:storybook']
    inputs:
      - 'src/**/*'
      - '.storybook/**/*'
      - 'vite-ignored.ts'
      - 'vitest.storybook.config.ts'
      - '/packages/**/*.stories.*'
      - '/packages/app/studio/src/**/*'
      - '/packages/lib/**/src/**/*'
