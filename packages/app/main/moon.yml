$schema: 'https://moonrepo.dev/schemas/project.json'

project:
  name: '@app/main'
  description: 'SolidStart host app'

dependsOn:
  - '@app/icon-editor'
  - '@app/service-worker'
  - '@app/settings'
  - '@app/studio'
  - '@lib/design'
  - '@lib/shell'
  - '@lib/state'
  - '@lib/ui'

tasks:
  dev:
    command: 'pnpm'
    args: ['dev']
    local: true
    options:
      outputStyle: 'stream'

  # Wrangler-backed dev server: serves the prerendered `.output/public`
  # tree through the same asset router (redirects, `404.html`,
  # `not_found_handling`) that production runs. Pair with `moon run
  # @app/main:build` (or `--watch`) to keep the bundle fresh — wrangler
  # itself only watches the asset directory, not source files.
  dev-wrangler:
    command: 'pnpm'
    args: ['dev:wrangler']
    deps:
      - 'build'
    local: true
    options:
      outputStyle: 'stream'

  build:
    command: 'pnpm'
    args: ['build']
    inputs:
      - 'src/**/*'
      - 'public/**/*'
      - 'vite.config.ts'
      - 'wrangler.jsonc'
      - '/packages/app/icon-editor/src/**/*'
      - '/packages/app/service-worker/src/**/*'
      - '/packages/app/settings/src/**/*'
      - '/packages/app/studio/src/**/*'
      - '/packages/lib/**/src/**/*'
    outputs:
      - '.output'
