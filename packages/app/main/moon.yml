$schema: 'https://moonrepo.dev/schemas/project.json'

project:
  name: '@app/main'
  description: 'SolidStart host app'

dependsOn:
  - '@app/storybook'
  - '@app/studio'
  - '@lib/design'
  - '@lib/shell'
  - '@lib/state'
  - '@lib/ui'

tasks:
  dev:
    command: 'pnpm'
    args: ['dev']
    local: true

  build-app:
    command: 'pnpm'
    args: ['build']
    inputs:
      - 'src/**/*'
      - 'vite.config.ts'
      - 'vite-ignored.ts'
      - 'wrangler.toml'
      - '/packages/app/studio/src/**/*'
      - '/packages/lib/**/src/**/*'
    outputs:
      - '.output'

  build:
    command: 'cp'
    args:
      - '-r'
      - '../storybook/storybook-static'
      - '.output/public/__storybook'
    deps:
      - '~:build-app'
      - '@app/storybook:build'
    inputs:
      - '/packages/app/storybook/storybook-static/**/*'
      - '.output/**/*'
    outputs:
      - '.output/public/__storybook'
