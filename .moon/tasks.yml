$schema: './cache/schemas/tasks.json'

# Buffer each task's output and only print it on failure. Keeps the
# signal-to-noise ratio high for both humans and agents — successful
# tasks show a one-line summary; only failures get the full log.
taskOptions:
  outputStyle: 'buffer-only-failure'

implicitInputs:
  - 'package.json'
  # Every package's manifest invalidates every task. Root holistic
  # tasks (typecheck, test, lint via `pnpm -r`) depend on script and
  # dep declarations across the workspace; catching those via the
  # lockfile alone misses no-op bumps and script-only edits.
  - '/packages/*/*/package.json'
  - '/pnpm-lock.yaml'
  - '/pnpm-workspace.yaml'

# Every task depends on a successful moon-config check. With moon's
# own caching this is near-free locally after the first run, and
# CI runs it fresh (see `@dev/workspace-cli:check-moon`'s `runInCI:
# always`). Makes the validator impossible to accidentally skip.
implicitDeps:
  - '@dev/workspace-cli:check-moon'
