on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      # Force ANSI color in tools that gate on TTY detection. `FORCE_COLOR`
      # covers the node ecosystem (chalk, picocolors, kleur, supports-color)
      # plus turbo and wrangler; `CLICOLOR_FORCE` covers Go tools like
      # treefmt that follow the BSD convention.
      FORCE_COLOR: '3'
      CLICOLOR_FORCE: '1'
    # Run every shell step inside the flake's devShell so CI stays in
    # sync with local dev (single source of truth in flake.nix).
    defaults:
      run:
        shell: nix develop --command bash -eo pipefail {0}
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: false
      # No-op that absorbs the first `nix develop` evaluation so its
      # cost shows up here instead of inflating the next real step.
      - name: Warm devShell
        run: 'true'
      - name: Restore pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - run: pnpm install --frozen-lockfile
      # Needed for `@dev/storybook#test`. Local dev uses the
      # nix-provided chromium via `CHROMIUM_PATH`; CI uses
      # playwright's own binary.
      - name: Restore playwright cache
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: Install playwright system deps
        run: pnpm --filter @dev/storybook exec playwright install-deps chromium
      - name: Install playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @dev/storybook exec playwright install chromium
      # Local turbo cache lives at `.turbo/`. The cache key includes
      # `github.sha` so each run writes a fresh entry; restore-keys
      # falls back to the most recent prior entry on the same branch
      # (or the default branch) for a warm start.
      - name: Restore turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      # The iroh chat POC compiles to wasm and is loaded by
      # `@app/main`'s route at build time. The generated `pkg/` is
      # gitignored, so CI rebuilds it before `pnpm check` runs vite.
      # Uses a dedicated nix devShell (separate flake) for rust +
      # wasm-bindgen-cli + binaryen + clang/llvm-ar for ring's C glue.
      - name: Cache iroh-poc cargo state
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/app/main/iroh-poc/target
          key: ${{ runner.os }}-iroh-poc-cargo-${{ hashFiles('packages/app/main/iroh-poc/Cargo.lock', 'packages/app/main/iroh-poc/rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-iroh-poc-cargo-
      - name: Build iroh-poc wasm
        # Job-default shell is `nix develop --command bash` against the
        # root flake. The crate needs a different toolchain (separate
        # flake), so cd in and invoke `nix develop` again — nested
        # devShells are fine, and `${{ github.workspace }}` isn't
        # allowed in the `shell:` field, ruling out an override there.
        run: |
          cd packages/app/main/iroh-poc
          nix develop --command bash -eo pipefail -c '
            cargo build --release
            wasm-bindgen ./target/wasm32-unknown-unknown/release/iroh_poc.wasm \
              --out-dir=pkg --weak-refs --target=web
            wasm-opt --enable-nontrapping-float-to-int --enable-bulk-memory \
              --strip-debug --strip-dwarf -Oz \
              -o pkg/iroh_poc_bg.wasm pkg/iroh_poc_bg.wasm
          '
      # `pnpm check` fans out every workspace check (lint, typecheck,
      # tests, knip, fmt, workspace validators, build) through turbo.
      # Cache hits skip work entirely. The build is part of `check`,
      # so `.output` is populated for the wrangler deploy step below.
      - run: pnpm check

      # Single-step `wrangler deploy` works but bypasses the version
      # model. Splitting into `wrangler versions upload` +
      # `wrangler versions deploy` would unlock `wrangler rollback` and
      # gradual rollouts — worth doing if this app ever needs a safety
      # net beyond "redeploy the previous commit".
      - name: Deploy to production
        if: github.ref == 'refs/heads/main'
        working-directory: packages/app/main
        run: pnpm exec wrangler deploy

      # Uploads a preview version on same-repo pull requests without
      # promoting to production. The `--preview-alias` pins the URL to
      # the PR number so reviewers get a stable link across pushes.
      - name: Upload preview version
        id: preview
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        working-directory: packages/app/main
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SUBDOMAIN: ${{ vars.WORKERS_DEV_SUBDOMAIN }}
        run: |
          pnpm exec wrangler versions upload --preview-alias "pr-$PR_NUMBER"
          echo "url=https://pr-$PR_NUMBER-apps.$SUBDOMAIN.workers.dev" >> "$GITHUB_OUTPUT"

      # Records a GitHub Deployment so the PR sidebar shows a "preview"
      # tile linking to the workers.dev URL.
      - name: Record preview deployment
        if: steps.preview.outputs.url
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha }}
          URL: ${{ steps.preview.outputs.url }}
        run: |
          # `required_contexts[]` (no value) sends an empty JSON
          # array — without it GitHub enforces commit status checks
          # against the PR's still-running CI run and 409s.
          deployment_id=$(gh api "repos/$REPO/deployments" \
            -f ref="$SHA" \
            -f environment=preview \
            -F auto_merge=false \
            -f required_contexts[] \
            -F transient_environment=true \
            -F production_environment=false \
            --jq .id)
          gh api "repos/$REPO/deployments/$deployment_id/statuses" \
            -f state=success \
            -f environment_url="$URL" \
            -f log_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
