on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Moon needs full history to detect touched files for
          # affected checks.
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v13
      # Hydrate PATH from the flake so subsequent steps can find
      # pnpm/moon/treefmt without wrapping each command in `nix develop`.
      - name: Activate flake environment
        run: nix develop --command bash -c 'echo "$PATH" >> "$GITHUB_PATH"'
      - name: Restore pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - run: pnpm install --frozen-lockfile
      # Needed for `main:test-storybook`. Local dev uses the nix-provided
      # chromium via `CHROMIUM_PATH`; CI uses playwright's own binary.
      - name: Restore playwright cache
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: Install playwright system deps
        run: pnpm --filter @app/main exec playwright install-deps chromium
      - name: Install playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @app/main exec playwright install chromium
      - name: Restore moon cache
        uses: actions/cache@v4
        with:
          path: .moon/cache
          key: ${{ runner.os }}-moon-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-moon-
      # `moon ci` runs every non-local, affected task. The explicit
      # `@app/main:build` after ensures `.output` exists for the
      # wrangler deploy step even on PRs that don't touch the app —
      # hits moon's cache when unchanged.
      - run: moon ci
      - run: moon run '@app/main:build'
      # Deploys to production on pushes to main.
      - name: Deploy to production
        if: github.ref == 'refs/heads/main'
        working-directory: packages/app/main
        run: pnpm exec wrangler deploy

      # Uploads a preview version on same-repo pull requests without
      # promoting to production. Captures the preview URL so subsequent
      # steps can advertise it on the PR.
      - name: Upload preview version
        id: preview
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        working-directory: packages/app/main
        run: |
          set -o pipefail
          pnpm exec wrangler versions upload | tee /tmp/wrangler.log
          # `|| true` so a missing URL doesn't trip `set -e`/`pipefail`.
          url=$(grep -oE 'https://[a-z0-9-]+\.[a-z0-9-]+\.workers\.dev' /tmp/wrangler.log | head -n1 || true)
          if [ -n "$url" ]; then
            echo "url=$url" >> "$GITHUB_OUTPUT"
          else
            # `preview_urls` is a non-versioned setting; it only takes
            # effect on the worker after the next `wrangler deploy`.
            # Until then, `versions upload` won't print a preview URL,
            # and the comment/deployment steps below skip silently.
            echo "::warning::No preview URL in wrangler output — \`preview_urls\` may not be live on the worker yet."
          fi

      # Records a GitHub Deployment so the PR sidebar shows a "preview"
      # tile linking to the workers.dev URL. `wrangler-action` claimed
      # to do this but only fired for `deploy`, never `versions upload`.
      - name: Record preview deployment
        if: steps.preview.outputs.url
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha }}
          URL: ${{ steps.preview.outputs.url }}
        run: |
          deployment_id=$(gh api "repos/$REPO/deployments" \
            -f ref="$SHA" \
            -f environment=preview \
            -F auto_merge=false \
            -f required_contexts:='[]' \
            -F transient_environment=true \
            -F production_environment=false \
            --jq .id)
          gh api "repos/$REPO/deployments/$deployment_id/statuses" \
            -f state=success \
            -f environment_url="$URL" \
            -f log_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

      # Posts (or updates) a sticky PR comment with the preview link.
      # The HTML marker lets us find the existing comment to edit
      # instead of spamming a new one each push.
      - name: Comment preview URL
        if: steps.preview.outputs.url
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          URL: ${{ steps.preview.outputs.url }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          marker='<!-- cf-preview -->'
          body="$marker"$'\n'"Preview: $URL (\`${SHA:0:7}\`)"
          existing=$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
            --jq "map(select(.body | startswith(\"$marker\"))) | .[0].id")
          if [ -n "$existing" ] && [ "$existing" != "null" ]; then
            gh api -X PATCH "repos/$REPO/issues/comments/$existing" -f body="$body"
          else
            gh api "repos/$REPO/issues/$PR/comments" -f body="$body"
          fi
