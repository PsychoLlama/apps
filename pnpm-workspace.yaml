packages:
  - packages/*/*
  - crates/*

# Default `pnpm add` to workspace:* for in-repo packages.
saveWorkspaceProtocol: true

# The flake (pkgs.pnpm) is the single source of truth for the pnpm
# version; CI runs every step inside `nix develop`. Turbo still requires a
# `packageManager` field in package.json to detect the package manager, but
# we don't want pnpm self-upgrading away from the nix-provided binary, so
# disable version management here. pnpm then ignores the field's version;
# turbo still reads its major to pick the matching lockfile parser (pnpm9),
# so package.json must track the flake's pnpm major.
managePackageManagerVersions: false

# Publicly hoist `@types/*` so workspace packages with no framework
# devDeps (e.g. `@dev/workspace-cli`, a plain node CLI) can still reach
# the `@types/node` that Vite and SolidStart already pull in. Every
# package still opts in explicitly via its tsconfig `types:` field,
# so this only affects resolution, not which globals leak where.
publicHoistPattern:
  - '@types/*'

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  sharp: true
  workerd: true

# Force framework singletons to the catalog version everywhere, including
# transitive dependents. Duplicate copies of solid-js break reactivity and
# duplicate vite breaks plugin identity, so they must resolve once.
overrides:
  '@solidjs/meta': 'catalog:'
  '@solidjs/router': 'catalog:'
  solid-js: 'catalog:'
  vite: 'catalog:'

catalog:
  '@holz/core': 0.8.3-rc.162
  '@holz/log-collector': 0.8.3-rc.162
  '@iconify/json': ^2.2.470
  '@solidjs/meta': ^0.29.4
  '@solidjs/router': ^0.16.1
  '@solidjs/testing-library': ^0.8.10
  '@testing-library/jest-dom': ^6.9.1
  '@testing-library/user-event': ^14.6.1
  '@vanilla-extract/css': ^1.20.1
  '@vanilla-extract/dynamic': ^2.1.5
  '@vitest/browser': ^4.1.5
  '@vitest/browser-playwright': ^4.1.5
  citty: ^0.2.2
  esbuild: ^0.28.0
  eslint: ^10.0.0
  knip: ^6.13.1
  playwright: ^1.59.1
  'solid-js': ^1.9.13
  turbo: ^2.5.8
  typescript: ^6.0.3
  'unplugin-icons': ^23.0.1
  vite: ^7.3.2
  vitest: ^4.1.5

minimumReleaseAgeExclude:
  - '@holz/ansi-terminal-backend@0.8.3-rc.155'
  - '@holz/console-backend@0.8.3-rc.155'
  - '@holz/core@0.8.3-rc.155'
  - '@holz/env-filter@0.8.3-rc.155'
  - '@holz/pattern-filter@0.8.3-rc.155'
  - '@holz/stream-backend@0.8.3-rc.155'
  - '@holz/log-collector@0.8.3-rc.155'
