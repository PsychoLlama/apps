$schema: 'https://moonrepo.dev/schemas/project.json'

project:
  name: 'root'
  description: 'Workspace-wide checks'

tasks:
  # Assembles the deploy artifact. `@app/main:build` writes the
  # solidstart bundle to `packages/app/main/.output`; storybook's
  # static bundle layers on at `/__storybook`. Wrangler picks up the
  # blended `.output/public` tree via `workingDirectory`.
  # Cache invalidation rides entirely on `deps` — moon re-runs this
  # task whenever either upstream produces new outputs. Listing the
  # upstream outputs as `inputs` here would be redundant, and worse,
  # this task's own output sits inside `@app/main`'s `.output` tree,
  # so a self-referential input would invalidate the cache on every
  # run.
  build:
    command: 'cp'
    args:
      - '-r'
      - 'packages/dev/storybook/storybook-static'
      - 'packages/app/main/.output/public/__storybook'
    deps:
      - '@app/main:build'
      - '@dev/storybook:build'
    outputs:
      - '/packages/app/main/.output/public/__storybook'

  fmt:
    command: 'treefmt'
    local: true

  fmt-check:
    command: 'treefmt'
    args: ['--ci']
    inputs:
      - '/**/*.{ts,tsx,js,jsx,mjs,cjs,json,md,yaml,yml,css,html}'
      - '/treefmt.toml'

  lint:
    command: 'pnpm'
    args: ['lint']
    inputs:
      - '/**/*.{ts,tsx,js,jsx,mjs,cjs}'
      - '/eslint.config.ts'
      - '/packages/dev/eslint-plugin/src/**/*'

  typecheck:
    command: 'pnpm'
    args: ['typecheck']
    inputs:
      - '/**/*.{ts,tsx}'
      - '/**/tsconfig*.json'

  test:
    command: 'pnpm'
    args: ['test']
    inputs:
      - '/packages/**/src/**/*'
      - '/vitest.config.ts'

  knip:
    command: 'pnpm'
    args: ['knip']
    inputs:
      - '/packages/**/src/**/*'
      - '/packages/**/package.json'
      - '/knip.config.ts'
      # Root `*.ts` files (eslint.config, vitest.config, knip.config)
      # are scanned by the `.` workspace's `project: ['*.ts']` pattern.
      - '/*.ts'
