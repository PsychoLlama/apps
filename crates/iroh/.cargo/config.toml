# Select getrandom's JS-backed entropy source for the browser build.
# getrandom 0.3 gates the wasm backend behind both a feature (see
# Cargo.toml) and this cfg; without it the wasm build fails to link a
# `getrandom` implementation. Scoped to the wasm target so native builds
# keep their OS entropy source. Picked up because `bin/build` runs cargo
# from this crate's directory.
[target.wasm32-unknown-unknown]
rustflags = ['--cfg', 'getrandom_backend="wasm_js"']
