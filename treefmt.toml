[global]
excludes = [".nitro/**", ".output/**", "dist/**", "target/**", "pnpm-lock.yaml"]

[formatter.prettier]
command = "pnpm"
options = ["exec", "prettier", "--write"]
includes = [
  "*.js",
  "*.jsx",
  "*.mjs",
  "*.cjs",
  "*.ts",
  "*.tsx",
  "*.json",
  "*.md",
  "*.yaml",
  "*.yml",
  "*.css",
  "*.html",
]

[formatter.rustfmt]
command = "rustfmt"
options = ["--edition", "2024"]
includes = ["*.rs"]
